<svg width="100%" viewBox="0 0 680 720" role="img" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" xmlns="http://www.w3.org/2000/svg">
<title>Workflow Phase 1 — Setup, Invite và Chuẩn bị</title>
<desc>Swimlane 3 vai trò: Recruiter, AI Agent, Candidate — giai đoạn setup và mời ứng viên (đã đồng bộ với code hiện tại)</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Lane headers -->
<rect x="30" y="20" width="190" height="36" rx="8" fill="rgb(238,237,254)" stroke="rgb(83,74,183)" stroke-width="0.5"/>
<text x="125" y="38" text-anchor="middle" dominant-baseline="central" fill="rgb(60,52,137)" font-size="14" font-weight="500">Recruiter</text>
<rect x="245" y="20" width="190" height="36" rx="8" fill="rgb(225,245,238)" stroke="rgb(15,110,86)" stroke-width="0.5"/>
<text x="340" y="38" text-anchor="middle" dominant-baseline="central" fill="rgb(8,80,65)" font-size="14" font-weight="500">AI Agent</text>
<rect x="460" y="20" width="190" height="36" rx="8" fill="rgb(230,241,251)" stroke="rgb(24,95,165)" stroke-width="0.5"/>
<text x="555" y="38" text-anchor="middle" dominant-baseline="central" fill="rgb(12,68,124)" font-size="14" font-weight="500">Candidate</text>

<!-- Lane dividers (behind boxes) -->
<line x1="235" y1="62" x2="235" y2="690" stroke="rgb(211,209,199)" stroke-width="0.5" stroke-dasharray="4 4"/>
<line x1="450" y1="62" x2="450" y2="690" stroke="rgb(211,209,199)" stroke-width="0.5" stroke-dasharray="4 4"/>

<!-- STEP 1: Recruiter tạo job -->
<g onclick="sendPrompt('Chi tiết bước Recruiter tạo Job Opening')">
  <rect x="40" y="76" width="170" height="52" rx="8" fill="rgb(238,237,254)" stroke="rgb(83,74,183)" stroke-width="0.5"/>
  <text x="125" y="96" text-anchor="middle" dominant-baseline="central" fill="rgb(60,52,137)" font-size="14" font-weight="500">Tạo Job Opening</text>
  <text x="125" y="114" text-anchor="middle" dominant-baseline="central" fill="rgb(83,74,183)" font-size="12">Nhập tiêu đề + mô tả JD</text>
</g>
<path d="M210 102 L245 102" marker-end="url(#arrow)" fill="none" stroke="rgb(115,114,108)" stroke-width="1.5"/>

<!-- AI phân tích JD, sinh câu hỏi -->
<g onclick="sendPrompt('AI sinh câu hỏi từ JD như thế nào?')">
  <rect x="255" y="76" width="170" height="52" rx="8" fill="rgb(225,245,238)" stroke="rgb(15,110,86)" stroke-width="0.5"/>
  <text x="340" y="96" text-anchor="middle" dominant-baseline="central" fill="rgb(8,80,65)" font-size="14" font-weight="500">Phân tích JD</text>
  <text x="340" y="114" text-anchor="middle" dominant-baseline="central" fill="rgb(15,110,86)" font-size="12">LLM sinh bộ câu hỏi từ JD</text>
</g>
<path d="M255 118 L210 118" marker-end="url(#arrow)" fill="none" stroke="rgb(15,110,86)" stroke-width="1.5"/>

<!-- STEP 2: Recruiter duyệt + kích hoạt -->
<line x1="125" y1="128" x2="125" y2="158" marker-end="url(#arrow)" stroke="rgb(115,114,108)" stroke-width="1.5"/>
<g onclick="sendPrompt('Recruiter duyệt và kích hoạt bộ câu hỏi như thế nào?')">
  <rect x="40" y="158" width="170" height="52" rx="8" fill="rgb(238,237,254)" stroke="rgb(83,74,183)" stroke-width="0.5"/>
  <text x="125" y="178" text-anchor="middle" dominant-baseline="central" fill="rgb(60,52,137)" font-size="14" font-weight="500">Duyệt &amp; kích hoạt</text>
  <text x="125" y="196" text-anchor="middle" dominant-baseline="central" fill="rgb(83,74,183)" font-size="12">Sửa/thêm/bớt → Activate</text>
</g>
<path d="M210 184 L245 184" marker-end="url(#arrow)" fill="none" stroke="rgb(83,74,183)" stroke-width="1.5"/>
<rect x="255" y="158" width="170" height="52" rx="8" fill="rgb(225,245,238)" stroke="rgb(15,110,86)" stroke-width="0.5"/>
<text x="340" y="178" text-anchor="middle" dominant-baseline="central" fill="rgb(8,80,65)" font-size="14" font-weight="500">Lưu question set</text>
<text x="340" y="196" text-anchor="middle" dominant-baseline="central" fill="rgb(15,110,86)" font-size="12">ACTIVE cho job</text>

<!-- STEP 3: nhập candidate + gửi invite -->
<line x1="125" y1="210" x2="125" y2="240" marker-end="url(#arrow)" stroke="rgb(115,114,108)" stroke-width="1.5"/>
<g onclick="sendPrompt('Recruiter tạo interview và nhập thông tin candidate như thế nào?')">
  <rect x="40" y="242" width="170" height="52" rx="8" fill="rgb(238,237,254)" stroke="rgb(83,74,183)" stroke-width="0.5"/>
  <text x="125" y="262" text-anchor="middle" dominant-baseline="central" fill="rgb(60,52,137)" font-size="14" font-weight="500">Tạo interview</text>
  <text x="125" y="280" text-anchor="middle" dominant-baseline="central" fill="rgb(83,74,183)" font-size="12">Nhập tên + email candidate</text>
</g>
<path d="M210 268 L245 268" marker-end="url(#arrow)" fill="none" stroke="rgb(83,74,183)" stroke-width="1.5"/>

<!-- AI tạo token + gửi email tự động (deadline auto 7 ngày) -->
<g onclick="sendPrompt('Token và email mời được tạo tự động như thế nào?')">
  <rect x="255" y="242" width="170" height="52" rx="8" fill="rgb(225,245,238)" stroke="rgb(15,110,86)" stroke-width="0.5"/>
  <text x="340" y="262" text-anchor="middle" dominant-baseline="central" fill="rgb(8,80,65)" font-size="14" font-weight="500">Token + email mời</text>
  <text x="340" y="280" text-anchor="middle" dominant-baseline="central" fill="rgb(15,110,86)" font-size="12">Gửi tự động · hạn 7 ngày</text>
</g>
<path d="M425 268 L460 268" marker-end="url(#arrow)" fill="none" stroke="rgb(15,110,86)" stroke-width="1.5"/>
<g onclick="sendPrompt('Candidate nhận được gì trong email mời?')">
  <rect x="470" y="242" width="170" height="52" rx="8" fill="rgb(230,241,251)" stroke="rgb(24,95,165)" stroke-width="0.5"/>
  <text x="555" y="262" text-anchor="middle" dominant-baseline="central" fill="rgb(12,68,124)" font-size="14" font-weight="500">Nhận email mời</text>
  <text x="555" y="280" text-anchor="middle" dominant-baseline="central" fill="rgb(24,95,165)" font-size="12">Link + hạn 7 ngày</text>
</g>

<!-- WAITING BAND -->
<rect x="30" y="318" width="620" height="28" rx="6" fill="rgb(250,250,249)" stroke="rgb(211,209,199)" stroke-width="0.5" stroke-dasharray="5 3"/>
<text x="340" y="333" text-anchor="middle" dominant-baseline="central" fill="rgb(61,61,58)" font-size="12">Thời gian chờ — candidate thực hiện bất cứ lúc nào; link tự hết hạn sau 7 ngày</text>

<!-- Candidate mở link -->
<line x1="555" y1="294" x2="555" y2="364" marker-end="url(#arrow)" stroke="rgb(115,114,108)" stroke-width="1.5"/>
<g onclick="sendPrompt('Candidate mở link interview thì điều gì xảy ra?')">
  <rect x="470" y="366" width="170" height="52" rx="8" fill="rgb(230,241,251)" stroke="rgb(24,95,165)" stroke-width="0.5"/>
  <text x="555" y="386" text-anchor="middle" dominant-baseline="central" fill="rgb(12,68,124)" font-size="14" font-weight="500">Mở link interview</text>
  <text x="555" y="404" text-anchor="middle" dominant-baseline="central" fill="rgb(24,95,165)" font-size="12">Bất cứ lúc nào, bất cứ đâu</text>
</g>
<path d="M470 392 L425 392" marker-end="url(#arrow)" fill="none" stroke="rgb(24,95,165)" stroke-width="1.5"/>

<!-- AI validate token + kiểm tra hạn -->
<rect x="255" y="366" width="170" height="52" rx="8" fill="rgb(225,245,238)" stroke="rgb(15,110,86)" stroke-width="0.5"/>
<text x="340" y="386" text-anchor="middle" dominant-baseline="central" fill="rgb(8,80,65)" font-size="14" font-weight="500">Validate token</text>
<text x="340" y="404" text-anchor="middle" dominant-baseline="central" fill="rgb(15,110,86)" font-size="12">Kiểm tra hạn (expiresAt)</text>

<!-- Consent screen -->
<line x1="340" y1="418" x2="340" y2="448" marker-end="url(#arrow)" stroke="rgb(115,114,108)" stroke-width="1.5"/>
<g onclick="sendPrompt('Màn hình đồng ý (consent) hiển thị gì?')">
  <rect x="255" y="450" width="170" height="52" rx="8" fill="rgb(225,245,238)" stroke="rgb(15,110,86)" stroke-width="0.5"/>
  <text x="340" y="470" text-anchor="middle" dominant-baseline="central" fill="rgb(8,80,65)" font-size="14" font-weight="500">Màn hình đồng ý</text>
  <text x="340" y="488" text-anchor="middle" dominant-baseline="central" fill="rgb(15,110,86)" font-size="12">Format, ghi âm, thời lượng</text>
</g>
<path d="M425 476 L460 476" marker-end="url(#arrow)" fill="none" stroke="rgb(15,110,86)" stroke-width="1.5"/>
<g onclick="sendPrompt('Bước kiểm tra thiết bị (device check) làm gì?')">
  <rect x="470" y="450" width="170" height="52" rx="8" fill="rgb(230,241,251)" stroke="rgb(24,95,165)" stroke-width="0.5"/>
  <text x="555" y="470" text-anchor="middle" dominant-baseline="central" fill="rgb(12,68,124)" font-size="14" font-weight="500">Đồng ý &amp; kiểm tra thiết bị</text>
  <text x="555" y="488" text-anchor="middle" dominant-baseline="central" fill="rgb(24,95,165)" font-size="12">Cấp quyền mic + camera</text>
</g>

<!-- Candidate xác nhận bắt đầu -->
<line x1="555" y1="502" x2="555" y2="532" marker-end="url(#arrow)" stroke="rgb(115,114,108)" stroke-width="1.5"/>
<rect x="470" y="534" width="170" height="52" rx="8" fill="rgb(230,241,251)" stroke="rgb(24,95,165)" stroke-width="0.5"/>
<text x="555" y="554" text-anchor="middle" dominant-baseline="central" fill="rgb(12,68,124)" font-size="14" font-weight="500">Xác nhận bắt đầu</text>
<text x="555" y="572" text-anchor="middle" dominant-baseline="central" fill="rgb(24,95,165)" font-size="12">Vào phòng phỏng vấn</text>
<path d="M470 560 L425 560" marker-end="url(#arrow)" fill="none" stroke="rgb(24,95,165)" stroke-width="1.5"/>
<rect x="255" y="534" width="170" height="52" rx="8" fill="rgb(225,245,238)" stroke="rgb(15,110,86)" stroke-width="0.5"/>
<text x="340" y="554" text-anchor="middle" dominant-baseline="central" fill="rgb(8,80,65)" font-size="14" font-weight="500">Khởi tạo session</text>
<text x="340" y="572" text-anchor="middle" dominant-baseline="central" fill="rgb(15,110,86)" font-size="12">Room + ghi hình bắt đầu</text>

<!-- Phase transition -->
<rect x="30" y="610" width="620" height="30" rx="6" fill="rgb(232,247,240)" stroke="rgb(29,158,117)" stroke-width="0.5" stroke-dasharray="3 3"/>
<text x="340" y="625" text-anchor="middle" dominant-baseline="central" fill="rgb(20,20,19)" font-size="14" font-weight="500">Tiếp theo: Interview Session bắt đầu</text>

<!-- Footnote -->
<text x="40" y="664" fill="rgb(120,118,110)" font-size="11">Ghi chú: email mời gửi qua SMTP (env SMTP_*). Khi chưa cấu hình SMTP, hệ thống log email và recruiter chia sẻ link thủ công.</text>
</svg>
