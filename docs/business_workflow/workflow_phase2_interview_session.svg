<svg width="100%" viewBox="0 0 680 820" role="img" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" xmlns="http://www.w3.org/2000/svg">
<title>Workflow Phase 2 — Interview Session core loop</title>
<desc>Vòng lặp hỏi đáp giữa AI Agent và Candidate (đã đồng bộ với code; follow-up động được đánh dấu Planned)</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Lane headers -->
<rect x="40" y="20" width="225" height="36" rx="8" fill="rgb(225,245,238)" stroke="rgb(15,110,86)" stroke-width="0.5"/>
<text x="152" y="38" text-anchor="middle" dominant-baseline="central" fill="rgb(8,80,65)" font-size="14" font-weight="500">AI Agent (Interviewer)</text>
<rect x="415" y="20" width="225" height="36" rx="8" fill="rgb(230,241,251)" stroke="rgb(24,95,165)" stroke-width="0.5"/>
<text x="527" y="38" text-anchor="middle" dominant-baseline="central" fill="rgb(12,68,124)" font-size="14" font-weight="500">Candidate</text>

<!-- Legend -->
<rect x="278" y="22" width="124" height="32" rx="6" fill="rgb(252,251,249)" stroke="rgb(220,218,210)" stroke-width="0.5"/>
<rect x="286" y="29" width="14" height="8" rx="2" fill="rgb(225,245,238)" stroke="rgb(15,110,86)" stroke-width="0.5"/>
<text x="304" y="33" dominant-baseline="central" fill="rgb(80,78,72)" font-size="10">Đã build</text>
<rect x="286" y="42" width="14" height="8" rx="2" fill="rgb(247,243,233)" stroke="rgb(180,117,23)" stroke-width="0.5" stroke-dasharray="3 2"/>
<text x="304" y="46" dominant-baseline="central" fill="rgb(80,78,72)" font-size="10">Planned</text>

<!-- Lane dividers -->
<line x1="265" y1="62" x2="265" y2="700" stroke="rgb(211,209,199)" stroke-width="0.5" stroke-dasharray="4 4"/>
<line x1="415" y1="62" x2="415" y2="700" stroke="rgb(211,209,199)" stroke-width="0.5" stroke-dasharray="4 4"/>

<!-- Greeting -->
<g onclick="sendPrompt('Trợ lý AI chào hỏi như thế nào?')">
  <rect x="45" y="76" width="200" height="52" rx="8" fill="rgb(225,245,238)" stroke="rgb(15,110,86)" stroke-width="0.5"/>
  <text x="145" y="96" text-anchor="middle" dominant-baseline="central" fill="rgb(8,80,65)" font-size="14" font-weight="500">Chào hỏi (TTS)</text>
  <text x="145" y="114" text-anchor="middle" dominant-baseline="central" fill="rgb(15,110,86)" font-size="12">Hiệu ứng "đang nói" (chưa lip-sync)</text>
</g>
<path d="M245 102 L435 102" marker-end="url(#arrow)" fill="none" stroke="rgb(15,110,86)" stroke-width="1.5"/>
<rect x="435" y="76" width="200" height="52" rx="8" fill="rgb(230,241,251)" stroke="rgb(24,95,165)" stroke-width="0.5"/>
<text x="535" y="96" text-anchor="middle" dominant-baseline="central" fill="rgb(12,68,124)" font-size="14" font-weight="500">Nghe lời chào</text>
<text x="535" y="114" text-anchor="middle" dominant-baseline="central" fill="rgb(24,95,165)" font-size="12">Xem equalizer trên màn hình</text>

<!-- Choose next question (sequential) -->
<line x1="145" y1="128" x2="145" y2="160" marker-end="url(#arrow)" stroke="rgb(115,114,108)" stroke-width="1.5"/>
<g onclick="sendPrompt('AI chọn câu hỏi tiếp theo như thế nào?')">
  <rect x="45" y="160" width="200" height="52" rx="8" fill="rgb(225,245,238)" stroke="rgb(15,110,86)" stroke-width="0.5"/>
  <text x="145" y="180" text-anchor="middle" dominant-baseline="central" fill="rgb(8,80,65)" font-size="14" font-weight="500">Chọn câu hỏi tiếp theo</text>
  <text x="145" y="198" text-anchor="middle" dominant-baseline="central" fill="rgb(15,110,86)" font-size="12">Tuần tự theo snapshot</text>
</g>

<!-- TTS read question -->
<line x1="145" y1="212" x2="145" y2="244" marker-end="url(#arrow)" stroke="rgb(115,114,108)" stroke-width="1.5"/>
<rect x="45" y="244" width="200" height="52" rx="8" fill="rgb(225,245,238)" stroke="rgb(15,110,86)" stroke-width="0.5"/>
<text x="145" y="264" text-anchor="middle" dominant-baseline="central" fill="rgb(8,80,65)" font-size="14" font-weight="500">TTS đọc câu hỏi</text>
<text x="145" y="282" text-anchor="middle" dominant-baseline="central" fill="rgb(15,110,86)" font-size="12">Equalizer khi đang phát</text>
<path d="M245 270 L435 270" marker-end="url(#arrow)" fill="none" stroke="rgb(15,110,86)" stroke-width="1.5"/>
<rect x="435" y="244" width="200" height="52" rx="8" fill="rgb(230,241,251)" stroke="rgb(24,95,165)" stroke-width="0.5"/>
<text x="535" y="264" text-anchor="middle" dominant-baseline="central" fill="rgb(12,68,124)" font-size="14" font-weight="500">Nghe câu hỏi</text>
<text x="535" y="282" text-anchor="middle" dominant-baseline="central" fill="rgb(24,95,165)" font-size="12">AI đọc, hiệu ứng đang nói</text>

<!-- Repeat (built) -->
<line x1="535" y1="296" x2="535" y2="328" marker-end="url(#arrow)" stroke="rgb(115,114,108)" stroke-width="1.5"/>
<g onclick="sendPrompt('Candidate nghe lại câu hỏi (repeat) như thế nào?')">
  <rect x="435" y="328" width="200" height="48" rx="8" fill="rgb(230,241,251)" stroke="rgb(24,95,165)" stroke-width="0.5"/>
  <text x="535" y="346" text-anchor="middle" dominant-baseline="central" fill="rgb(12,68,124)" font-size="14" font-weight="500">Nghe lại câu hỏi (tuỳ chọn)</text>
  <text x="535" y="362" text-anchor="middle" dominant-baseline="central" fill="rgb(24,95,165)" font-size="12">Phát lại TTS · không trừ giờ</text>
</g>
<!-- repeat loop back to TTS -->
<path d="M435 352 L340 352 L340 270 L245 270" fill="none" stroke="rgb(24,95,165)" stroke-width="0.5" stroke-dasharray="3 3" marker-end="url(#arrow)"/>
<text x="340" y="316" text-anchor="middle" fill="rgb(61,61,58)" font-size="11">phát lại</text>

<!-- Answer by voice + STT -->
<line x1="535" y1="376" x2="535" y2="408" marker-end="url(#arrow)" stroke="rgb(115,114,108)" stroke-width="1.5"/>
<g onclick="sendPrompt('Candidate trả lời bằng giọng nói và STT hoạt động ra sao?')">
  <rect x="435" y="408" width="200" height="52" rx="8" fill="rgb(230,241,251)" stroke="rgb(24,95,165)" stroke-width="0.5"/>
  <text x="535" y="428" text-anchor="middle" dominant-baseline="central" fill="rgb(12,68,124)" font-size="14" font-weight="500">Trả lời bằng giọng nói</text>
  <text x="535" y="446" text-anchor="middle" dominant-baseline="central" fill="rgb(24,95,165)" font-size="12">Ghi âm · timer mỗi câu</text>
</g>
<path d="M435 434 L245 434" marker-end="url(#arrow)" fill="none" stroke="rgb(24,95,165)" stroke-width="1.5"/>
<rect x="45" y="408" width="200" height="52" rx="8" fill="rgb(225,245,238)" stroke="rgb(15,110,86)" stroke-width="0.5"/>
<text x="145" y="428" text-anchor="middle" dominant-baseline="central" fill="rgb(8,80,65)" font-size="14" font-weight="500">Nhận transcript</text>
<text x="145" y="446" text-anchor="middle" dominant-baseline="central" fill="rgb(15,110,86)" font-size="12">STT / Whisper · lưu answer</text>

<!-- Decision: more questions? -->
<line x1="145" y1="460" x2="145" y2="492" marker-end="url(#arrow)" stroke="rgb(115,114,108)" stroke-width="1.5"/>
<polygon points="145,492 200,520 145,548 90,520" fill="rgb(225,245,238)" stroke="rgb(15,110,86)" stroke-width="0.5"/>
<text x="145" y="515" text-anchor="middle" dominant-baseline="central" fill="rgb(61,61,58)" font-size="12">Còn câu</text>
<text x="145" y="529" text-anchor="middle" dominant-baseline="central" fill="rgb(61,61,58)" font-size="12">hỏi?</text>

<!-- PLANNED: dynamic follow-up -->
<g onclick="sendPrompt('Follow-up động (LLM) — vì sao chưa build và cần gì để build?')">
  <rect x="262" y="496" width="150" height="48" rx="8" fill="rgb(247,243,233)" stroke="rgb(180,117,23)" stroke-width="0.6" stroke-dasharray="5 3"/>
  <text x="337" y="513" text-anchor="middle" dominant-baseline="central" fill="rgb(146,93,18)" font-size="13" font-weight="500">Follow-up động (LLM)</text>
  <text x="337" y="531" text-anchor="middle" dominant-baseline="central" fill="rgb(146,93,18)" font-size="11">Planned — chưa build</text>
</g>
<path d="M200 520 L262 520" fill="none" stroke="rgb(180,117,23)" stroke-width="0.6" stroke-dasharray="3 3" marker-end="url(#arrow)"/>

<!-- "còn" loop back to choose next question -->
<path d="M145 548 L145 568 L30 568 L30 186 L45 186" fill="none" stroke="rgb(15,110,86)" stroke-width="0.5" stroke-dasharray="3 3" marker-end="url(#arrow)"/>
<text x="36" y="376" text-anchor="start" fill="rgb(61,61,58)" font-size="11" transform="rotate(-90 36 376)">còn câu hỏi → câu tiếp theo</text>

<!-- End: closing TTS -->
<path d="M145 548 L145 588" fill="none" stroke="rgb(115,114,108)" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="158" y="572" text-anchor="start" fill="rgb(61,61,58)" font-size="11">hết câu hỏi</text>
<g onclick="sendPrompt('Lời cảm ơn kết thúc (TTS closing) hoạt động ra sao?')">
  <rect x="45" y="590" width="200" height="52" rx="8" fill="rgb(225,245,238)" stroke="rgb(15,110,86)" stroke-width="0.5"/>
  <text x="145" y="610" text-anchor="middle" dominant-baseline="central" fill="rgb(8,80,65)" font-size="14" font-weight="500">TTS lời cảm ơn</text>
  <text x="145" y="628" text-anchor="middle" dominant-baseline="central" fill="rgb(15,110,86)" font-size="12">Phát closing → đóng session</text>
</g>
<path d="M245 616 L435 616" marker-end="url(#arrow)" fill="none" stroke="rgb(15,110,86)" stroke-width="1.5"/>
<rect x="435" y="590" width="200" height="52" rx="8" fill="rgb(230,241,251)" stroke="rgb(24,95,165)" stroke-width="0.5"/>
<text x="535" y="610" text-anchor="middle" dominant-baseline="central" fill="rgb(12,68,124)" font-size="14" font-weight="500">Nghe lời cảm ơn</text>
<text x="535" y="628" text-anchor="middle" dominant-baseline="central" fill="rgb(24,95,165)" font-size="12">Rời phòng phỏng vấn</text>

<!-- Trigger analysis -->
<line x1="145" y1="642" x2="145" y2="674" marker-end="url(#arrow)" stroke="rgb(115,114,108)" stroke-width="1.5"/>
<rect x="45" y="674" width="200" height="48" rx="8" fill="rgb(225,245,238)" stroke="rgb(15,110,86)" stroke-width="0.5"/>
<text x="145" y="692" text-anchor="middle" dominant-baseline="central" fill="rgb(8,80,65)" font-size="14" font-weight="500">Enqueue report job</text>
<text x="145" y="708" text-anchor="middle" dominant-baseline="central" fill="rgb(15,110,86)" font-size="12">Async (BullMQ) · COMPLETED</text>

<!-- Phase 3 marker -->
<rect x="30" y="742" width="620" height="30" rx="6" fill="rgb(232,247,240)" stroke="rgb(29,158,117)" stroke-width="0.5" stroke-dasharray="3 3"/>
<text x="340" y="757" text-anchor="middle" dominant-baseline="central" fill="rgb(20,20,19)" font-size="14" font-weight="500">Tiếp theo: AI phân tích và ra kết quả</text>
</svg>
