<svg width="100%" viewBox="0 0 680 760" role="img" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" xmlns="http://www.w3.org/2000/svg">
<title>Workflow Phase 3 — AI phân tích và ra kết quả</title>
<desc>AI phân tích transcript, recruiter nhận báo cáo và quyết định; luồng từ chối tự động được đánh dấu Planned</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Lane headers -->
<rect x="30" y="20" width="150" height="36" rx="8" fill="rgb(238,237,254)" stroke="rgb(83,74,183)" stroke-width="0.5"/>
<text x="105" y="38" text-anchor="middle" dominant-baseline="central" fill="rgb(60,52,137)" font-size="14" font-weight="500">Recruiter</text>
<rect x="200" y="20" width="240" height="36" rx="8" fill="rgb(225,245,238)" stroke="rgb(15,110,86)" stroke-width="0.5"/>
<text x="320" y="38" text-anchor="middle" dominant-baseline="central" fill="rgb(8,80,65)" font-size="14" font-weight="500">AI Agent (Analysis)</text>
<rect x="460" y="20" width="190" height="36" rx="8" fill="rgb(230,241,251)" stroke="rgb(24,95,165)" stroke-width="0.5"/>
<text x="555" y="38" text-anchor="middle" dominant-baseline="central" fill="rgb(12,68,124)" font-size="14" font-weight="500">Candidate</text>

<!-- Lane dividers -->
<line x1="190" y1="62" x2="190" y2="680" stroke="rgb(211,209,199)" stroke-width="0.5" stroke-dasharray="4 4"/>
<line x1="450" y1="62" x2="450" y2="680" stroke="rgb(211,209,199)" stroke-width="0.5" stroke-dasharray="4 4"/>

<!-- AI: analyze transcript -->
<g onclick="sendPrompt('AI phân tích transcript như thế nào?')">
  <rect x="208" y="76" width="224" height="52" rx="8" fill="rgb(225,245,238)" stroke="rgb(15,110,86)" stroke-width="0.5"/>
  <text x="320" y="96" text-anchor="middle" dominant-baseline="central" fill="rgb(8,80,65)" font-size="14" font-weight="500">Phân tích transcript</text>
  <text x="320" y="114" text-anchor="middle" dominant-baseline="central" fill="rgb(15,110,86)" font-size="12">So với JD + CV</text>
</g>
<line x1="320" y1="128" x2="320" y2="160" marker-end="url(#arrow)" stroke="rgb(115,114,108)" stroke-width="1.5"/>

<!-- AI: rubric scoring -->
<g onclick="sendPrompt('Báo cáo chấm điểm theo những tiêu chí nào?')">
  <rect x="208" y="160" width="224" height="52" rx="8" fill="rgb(225,245,238)" stroke="rgb(15,110,86)" stroke-width="0.5"/>
  <text x="320" y="180" text-anchor="middle" dominant-baseline="central" fill="rgb(8,80,65)" font-size="14" font-weight="500">Chấm điểm theo rubric</text>
  <text x="320" y="198" text-anchor="middle" dominant-baseline="central" fill="rgb(15,110,86)" font-size="12">QA · CV-match · JD-fit · audio/video</text>
</g>
<line x1="320" y1="212" x2="320" y2="244" marker-end="url(#arrow)" stroke="rgb(115,114,108)" stroke-width="1.5"/>

<!-- AI: build report + recommendation -->
<rect x="208" y="244" width="224" height="52" rx="8" fill="rgb(225,245,238)" stroke="rgb(15,110,86)" stroke-width="0.5"/>
<text x="320" y="264" text-anchor="middle" dominant-baseline="central" fill="rgb(8,80,65)" font-size="14" font-weight="500">Tạo báo cáo + recommendation</text>
<text x="320" y="282" text-anchor="middle" dominant-baseline="central" fill="rgb(15,110,86)" font-size="12">summary · strengths · risk flags · decision</text>
<line x1="320" y1="296" x2="320" y2="328" marker-end="url(#arrow)" stroke="rgb(115,114,108)" stroke-width="1.5"/>

<!-- AI: notify report ready -->
<g onclick="sendPrompt('Recruiter được thông báo report ready như thế nào?')">
  <rect x="208" y="328" width="224" height="52" rx="8" fill="rgb(225,245,238)" stroke="rgb(15,110,86)" stroke-width="0.5"/>
  <text x="320" y="348" text-anchor="middle" dominant-baseline="central" fill="rgb(8,80,65)" font-size="14" font-weight="500">Thông báo report ready</text>
  <text x="320" y="366" text-anchor="middle" dominant-baseline="central" fill="rgb(15,110,86)" font-size="12">Email recruiter + dashboard status</text>
</g>
<path d="M208 354 L185 354" marker-end="url(#arrow)" fill="none" stroke="rgb(15,110,86)" stroke-width="1.5"/>

<!-- Recruiter: receive notification -->
<rect x="35" y="328" width="150" height="52" rx="8" fill="rgb(238,237,254)" stroke="rgb(83,74,183)" stroke-width="0.5"/>
<text x="110" y="348" text-anchor="middle" dominant-baseline="central" fill="rgb(60,52,137)" font-size="14" font-weight="500">Nhận thông báo</text>
<text x="110" y="366" text-anchor="middle" dominant-baseline="central" fill="rgb(83,74,183)" font-size="12">Email + status trên dashboard</text>
<line x1="110" y1="380" x2="110" y2="404" marker-end="url(#arrow)" stroke="rgb(115,114,108)" stroke-width="1.5"/>

<!-- Recruiter: view full report -->
<g onclick="sendPrompt('Recruiter xem full report gồm những gì?')">
  <rect x="35" y="404" width="150" height="52" rx="8" fill="rgb(238,237,254)" stroke="rgb(83,74,183)" stroke-width="0.5"/>
  <text x="110" y="424" text-anchor="middle" dominant-baseline="central" fill="rgb(60,52,137)" font-size="14" font-weight="500">Xem full report</text>
  <text x="110" y="442" text-anchor="middle" dominant-baseline="central" fill="rgb(83,74,183)" font-size="12">score · transcript · recommendation</text>
</g>
<line x1="110" y1="456" x2="110" y2="460" marker-end="url(#arrow)" stroke="rgb(115,114,108)" stroke-width="1.5"/>

<!-- Recruiter decision -->
<polygon points="110,460 165,492 110,524 55,492" fill="rgb(238,237,254)" stroke="rgb(83,74,183)" stroke-width="0.5"/>
<text x="110" y="492" text-anchor="middle" dominant-baseline="central" fill="rgb(60,52,137)" font-size="12">Proceed?</text>

<!-- YES: manual contact -->
<line x1="110" y1="524" x2="110" y2="560" marker-end="url(#arrow)" stroke="rgb(29,158,117)" stroke-width="1.5"/>
<text x="118" y="544" text-anchor="start" fill="rgb(61,61,58)" font-size="11">Có</text>
<rect x="35" y="560" width="150" height="52" rx="8" fill="rgb(238,237,254)" stroke="rgb(83,74,183)" stroke-width="0.5"/>
<text x="110" y="580" text-anchor="middle" dominant-baseline="central" fill="rgb(60,52,137)" font-size="14" font-weight="500">Liên hệ ứng viên</text>
<text x="110" y="598" text-anchor="middle" dominant-baseline="central" fill="rgb(83,74,183)" font-size="12">Thủ công (chưa tự động)</text>
<path d="M185 586 L460 586" fill="none" stroke="rgb(83,74,183)" stroke-width="0.5" stroke-dasharray="3 3" marker-end="url(#arrow)"/>
<text x="322" y="578" text-anchor="middle" fill="rgb(61,61,58)" font-size="11">liên hệ trực tiếp</text>
<rect x="460" y="560" width="185" height="52" rx="8" fill="rgb(230,241,251)" stroke="rgb(24,95,165)" stroke-width="0.5"/>
<text x="552" y="580" text-anchor="middle" dominant-baseline="central" fill="rgb(12,68,124)" font-size="14" font-weight="500">Được mời vòng sau</text>
<text x="552" y="598" text-anchor="middle" dominant-baseline="central" fill="rgb(24,95,165)" font-size="12">Do recruiter liên hệ</text>

<!-- NO: planned rejection automation -->
<path d="M165 492 L208 492" marker-end="url(#arrow)" fill="none" stroke="rgb(180,117,23)" stroke-width="0.6" stroke-dasharray="3 3"/>
<text x="186" y="484" text-anchor="middle" fill="rgb(61,61,58)" font-size="11">Không</text>
<g onclick="sendPrompt('Luồng từ chối tự động (thank-you email, review 24h, auto-send) — cần gì để build?')">
  <rect x="208" y="466" width="427" height="60" rx="8" fill="rgb(247,243,233)" stroke="rgb(180,117,23)" stroke-width="0.6" stroke-dasharray="5 3"/>
  <text x="421" y="486" text-anchor="middle" dominant-baseline="central" fill="rgb(146,93,18)" font-size="13" font-weight="500">Planned — luồng từ chối tự động (chưa build)</text>
  <text x="421" y="506" text-anchor="middle" dominant-baseline="central" fill="rgb(146,93,18)" font-size="11">AI soạn thank-you email → recruiter review/override 24h → auto-send → candidate nhận</text>
</g>

<!-- End marker -->
<rect x="30" y="636" width="620" height="30" rx="6" fill="rgb(245,244,242)" stroke="rgb(136,135,128)" stroke-width="0.5"/>
<text x="340" y="651" text-anchor="middle" dominant-baseline="central" fill="rgb(20,20,19)" font-size="14" font-weight="500">Kết thúc workflow — Recruiter ra quyết định cuối cùng</text>

<!-- Legend + dashboard note -->
<rect x="30" y="678" width="14" height="9" rx="2" fill="rgb(225,245,238)" stroke="rgb(15,110,86)" stroke-width="0.5"/>
<text x="49" y="683" dominant-baseline="central" fill="rgb(80,78,72)" font-size="11">Đã build</text>
<rect x="120" y="678" width="14" height="9" rx="2" fill="rgb(247,243,233)" stroke="rgb(180,117,23)" stroke-width="0.5" stroke-dasharray="3 2"/>
<text x="139" y="683" dominant-baseline="central" fill="rgb(80,78,72)" font-size="11">Planned (chưa build)</text>
<text x="30" y="706" fill="rgb(120,118,110)" font-size="11">Dashboard: lọc theo trạng thái (đã build); sắp xếp &amp; so sánh ứng viên là Planned.</text>
</svg>
