name: CI

# Runs on the dev branch and on PRs into main — lint + typecheck + build both apps.
# No deploy here; deployment to AgentBase happens from main (see deploy.yml).
on:
  push:
    branches: [dev]
  pull_request:
    branches: [main, dev]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter backend prisma:generate

      - name: Build (typechecks backend + frontend)
        run: pnpm build

      - name: Lint
        run: pnpm lint
        continue-on-error: true
